<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JPEG Trust Image Verifier</title>

<!-- link to CSS file -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>JPEG Trust Image Verification</h1>

<p>Upload an image and generate a Trust Report.</p>


<!-- trust profile -->
<label>Trust Profile</label>
<select id="profile">
<option value="news">News</option>
<option value="social">Social Media</option>
</select>


<br><br>


<!-- image upload -->
<input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">


<br><br>


<!-- preview -->
<h3>Image Preview</h3>
<img id="preview" class="preview">


<br><br>


<!-- upload button -->
<button id="uploadButton">Upload & Evaluate</button>


<br><br>


<!-- status -->
<div id="status"></div>


<!-- trust report -->
<h2>Trust Report</h2>
<pre id="report">{}</pre>

</div>



<script>

// elements
const fileInput = document.getElementById("fileInput")
const preview = document.getElementById("preview")
const uploadButton = document.getElementById("uploadButton")
const profile = document.getElementById("profile")
const status = document.getElementById("status")
const report = document.getElementById("report")


// preview image
fileInput.addEventListener("change", () => {

const file = fileInput.files[0]

if(!file) return

preview.src = URL.createObjectURL(file)
preview.style.display = "block"

})


// upload image
uploadButton.addEventListener("click", async () => {

const file = fileInput.files[0]

if(!file){
alert("Select an image")
return
}

status.innerText = "Uploading..."

const formData = new FormData()

formData.append("file", file)
formData.append("profile", profile.value)

try{

const response = await fetch("/api/upload",{
method:"POST",
body:formData
})

const data = await response.json()

report.textContent = JSON.stringify(data,null,2)

status.innerText = "Done"

}

catch(error){

status.innerText = "Upload failed"
console.error(error)

}

})

</script>

</body>
</html>
